# k8s/monitoring/grafana.yaml
#
# Grafana with the Prometheus datasource and Venera dashboard pre-provisioned
# (via ConfigMaps mounted into Grafana's provisioning directories), so there's
# no manual "add datasource" click-through after deploy.

apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: monitoring
data:
  datasource.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: monitoring
data:
  provider.yaml: |
    apiVersion: 1
    providers:
      - name: Venera
        folder: ""
        type: file
        options:
          path: /var/lib/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-venera
  namespace: monitoring
data:
  venera-chatbot.json: |
    {
      "title": "Venera Chatbot",
      "uid": "venera-chatbot",
      "timezone": "browser",
      "schemaVersion": 39,
      "refresh": "30s",
      "time": { "from": "now-6h", "to": "now" },
      "panels": [
        {
          "id": 1,
          "title": "Requests/sec (/chat)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 0 },
          "targets": [
            {
              "expr": "sum(rate(chatbot_requests_total{endpoint=\"/chat\"}[1m])) by (status)",
              "legendFormat": "{{status}}"
            }
          ]
        },
        {
          "id": 2,
          "title": "p50 / p95 / p99 Latency (/chat)",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 0 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(chatbot_request_latency_seconds_bucket{endpoint=\"/chat\"}[5m])) by (le))",
              "legendFormat": "p50"
            },
            {
              "expr": "histogram_quantile(0.95, sum(rate(chatbot_request_latency_seconds_bucket{endpoint=\"/chat\"}[5m])) by (le))",
              "legendFormat": "p95"
            },
            {
              "expr": "histogram_quantile(0.99, sum(rate(chatbot_request_latency_seconds_bucket{endpoint=\"/chat\"}[5m])) by (le))",
              "legendFormat": "p99"
            }
          ]
        },
        {
          "id": 3,
          "title": "Tokens Generated per Response",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 8 },
          "targets": [
            {
              "expr": "histogram_quantile(0.50, sum(rate(chatbot_tokens_generated_bucket[5m])) by (le))",
              "legendFormat": "p50 tokens"
            }
          ]
        },
        {
          "id": 4,
          "title": "In-Progress Requests",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 8 },
          "targets": [
            { "expr": "chatbot_requests_in_progress", "legendFormat": "in-progress" }
          ]
        },
        {
          "id": 5,
          "title": "Inference Error Rate",
          "type": "timeseries",
          "gridPos": { "h": 8, "w": 12, "x": 0, "y": 16 },
          "targets": [
            { "expr": "rate(chatbot_inference_errors_total[5m])", "legendFormat": "errors/sec" }
          ]
        },
        {
          "id": 6,
          "title": "Model Loaded",
          "type": "stat",
          "gridPos": { "h": 8, "w": 12, "x": 12, "y": 16 },
          "targets": [
            { "expr": "chatbot_model_loaded", "legendFormat": "loaded" }
          ]
        }
      ]
    }
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: monitoring
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      containers:
        - name: grafana
          image: grafana/grafana:11.1.0
          ports:
            - containerPort: 3000
          env:
            # Prototype-only default login. Change before this touches anything real.
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: "admin"
          resources:
            requests:
              memory: "128Mi"
              cpu: "100m"
            limits:
              memory: "256Mi"
              cpu: "300m"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboard-venera
              mountPath: /var/lib/grafana/dashboards
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboard-venera
          configMap:
            name: grafana-dashboard-venera
---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: monitoring
spec:
  selector:
    app: grafana
  ports:
    - port: 3000
      targetPort: 3000
  # LoadBalancer to match the pattern used for the chatbot service itself —
  # switch to ClusterIP + port-forward if you'd rather not expose Grafana publicly.
  type: LoadBalancer
