# k8s/secret.yaml
#
# DO NOT apply this file directly with real values — it's a template only.
# Create the secret via kubectl instead:
#
#   kubectl create secret generic venera-secrets \
#     --from-literal=hf-token=hf_YOUR_TOKEN_HERE
#
# To verify: kubectl get secret venera-secrets

apiVersion: v1
kind: Secret
metadata:
  name: venera-secrets
type: Opaque
stringData:
  hf-token: "REPLACE_WITH_REAL_VALUE_VIA_KUBECTL_DO_NOT_COMMIT"
