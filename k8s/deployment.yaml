# k8s/deployment.yaml
#
# Kubernetes Deployment for the Venera AI chatbot inference server.
# Model is downloaded from HuggingFace at pod startup via HF_TOKEN.
#
# Before applying:
#   1. Create the venera-secrets Secret (real token, not the literal string
#      "YOUR_HF_TOKEN" — that placeholder made it into the secret once
#      during Stage 7 and caused a run of confusing 401s):
#      kubectl create secret generic venera-secrets \
#        --from-literal=hf-token=hf_YOUR_TOKEN_HERE
#   2. Apply: kubectl apply -f k8s/

apiVersion: apps/v1
kind: Deployment
metadata:
  name: venera-chatbot
  labels:
    app: venera-chatbot
spec:
  replicas: 1
  # Recreate instead of the default RollingUpdate. This is a prototype on a
  # capacity-constrained node pool (each pod requests 1 CPU; a single
  # e2-standard-2 node has ~2 vCPU allocatable after GKE's own system
  # daemonsets). RollingUpdate needs old+new pods scheduled simultaneously
  # during every deploy, which repeatedly deadlocked in Stage 7 — the old
  # pod holds its CPU reservation and blocks the new one from scheduling,
  # requiring manual `kubectl scale replicaset <old> --replicas=0` every
  # single time. Recreate trades a few seconds of downtime per deploy
  # (old pod is killed before the new one starts) for never needing that
  # manual intervention. Fine for a prototype with no real traffic; revisit
  # if this ever needs zero-downtime deploys (would need more node capacity
  # instead, not a strategy change back to RollingUpdate).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: venera-chatbot
  template:
    metadata:
      labels:
        app: venera-chatbot
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "8000"
        prometheus.io/path: "/metrics"
    spec:
      containers:
        - name: venera-chatbot
          image: us-east1-docker.pkg.dev/venera-chatbot/venera-chatbot/venera-chatbot:latest
          ports:
            - containerPort: 8000
          env:
            - name: HF_TOKEN
              valueFrom:
                secretKeyRef:
                  name: venera-secrets
                  key: hf-token
            - name: HF_REPO_ID
              value: "quynh-venera1/venera-chatbot-model"
            - name: HF_FILENAME
              value: "model-q4.gguf"
            - name: MODEL_CACHE_PATH
              value: /app/model.gguf
            - name: N_CTX
              value: "4096"
            - name: N_THREADS
              value: "4"
            - name: MAX_TOKENS
              value: "512"
          resources:
            requests:
              memory: "2Gi"
              cpu: "1"
            limits:
              memory: "4Gi"
              cpu: "2"
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            # Stage 7 finding: under concurrent /chat load, inference is
            # serialized (see INFERENCE_LOCK in serve/app.py) and CPU can
            # sit near 100% for the duration. /health is a sync endpoint
            # sharing the same threadpool as /chat, so it can occasionally
            # miss the default 1s probe timeout even though the process is
            # healthy — this caused a real SIGKILL restart during load
            # testing. timeoutSeconds=10 gives it real room; failureThreshold=5
            # means transient saturation needs to persist for 2.5 minutes
            # (5 x 30s period) before Kubernetes concludes the pod is
            # actually stuck, not just busy.
            timeoutSeconds: 10
            failureThreshold: 5
          readinessProbe:
            httpGet:
              path: /ready
              port: 8000
            # First startup downloads ~1GB from HuggingFace then loads model.
            # Allow up to 5 minutes before marking as not ready.
            initialDelaySeconds: 60
            periodSeconds: 15
            timeoutSeconds: 10
            failureThreshold: 20
